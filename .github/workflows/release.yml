name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Package ludica
        run: |
          ver="${{ steps.version.outputs.version }}"
          staging="ludica-${ver}"
          mkdir -p "${staging}/include" "${staging}/unix" "${staging}/linux" "${staging}/win32"

          # Public headers + vendored GL/EGL/KHR headers
          cp src/ludica/include/*.h "${staging}/include/"
          cp -r src/ludica/include/EGL   "${staging}/include/"
          cp -r src/ludica/include/GLES2 "${staging}/include/"
          cp -r src/ludica/include/GLES3 "${staging}/include/"
          cp -r src/ludica/include/KHR   "${staging}/include/"

          # Core sources
          cp src/ludica/*.c              "${staging}/"
          cp src/ludica/ludica_internal.h "${staging}/"

          # Platform sources
          cp src/ludica/platform_x11.c   "${staging}/"
          cp src/ludica/unix/*.c         "${staging}/unix/"
          cp src/ludica/unix/*.h         "${staging}/unix/"
          cp src/ludica/linux/*.c        "${staging}/linux/"
          cp src/ludica/linux/*.h        "${staging}/linux/"
          cp src/ludica/win32/*.c        "${staging}/win32/"
          cp src/ludica/win32/*.h        "${staging}/win32/"

          # Build files
          cp src/ludica/module.mk        "${staging}/"
          cp VERSION                     "${staging}/"
          cp LICENSE                     "${staging}/" 2>/dev/null || true

          # Stamp version into header
          sed -i "s/^#define LUD_VERSION.*/#define LUD_VERSION \"${ver}\"/" \
              "${staging}/include/ludica.h"

          tar czf "ludica-${ver}.tar.gz" "${staging}"
          echo "TARBALL=ludica-${ver}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.version.outputs.version }}"
          gh release create "v${ver}" "${TARBALL}" \
            --title "v${ver}" \
            --generate-notes
